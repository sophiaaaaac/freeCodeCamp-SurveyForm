<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Survey Form</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="main-section">
        <h1 id="title">Cafe Survey</h1>
        <p id="description">Thanks for dining at our Cafe! Please take this short survey on your experience to help us improve :)</p>
        <form id="survey-form">
        <label id="name-label">Name</label><br>
        <input id="name" type="text" placeholder="John Smith" required><br><br>

        <label id="email-label">Email</label><br>
        <input id="email" type="email" required placeholder="johnsmith@gmail.com"><br><br>

        <label id="number-label">Age</label><br>
        <input id="number" type="number" min="18" max="100" placeholder="18"><br><br>
        
        <label>Location</label><br>
        <select id="dropdown">
            <option type="radio" value="belco" name="area">Belconnen</option>
            <option type="radio" value="cbd" name="area">Canberra City</option>
        </select><br><br>

        <label>Would you reccommend us to a friend?</label><br>
        <label><input type="radio" value="yes" name="recomm"> Yes</label><br>
        <label><input type="radio" value="maybe" name="recomm"> Maybe</label><br>
        <label><input type="radio" value="no" name="recomm"> No</label><br>
        <br><br>

        <label>What should we improve?</label><br>
        <label><input type="checkbox" value="time" name="improv"> Wait times</label><br>
        <label><input type="checkbox" value="options" name="improv"> More drink options</label><br>
        <label><input type="checkbox" value="time" name="improv"> Better customer service</label><br>
        <br><br>

        <label>Comments</label><br>
        <textarea rows="5"></textarea><br><br>

        <button id="submit" type="submit">Submit</button>

        </form>
    </div>
  </body>
</html>
